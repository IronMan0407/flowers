<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="img/flowers.png" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
    <title>Flowers — Оюундарьт</title>
    <style>
      :root {
        --rose:    #ffb3c6;
        --blush:   #ff80ab;
        --deep:    #c2185b;
        --cream:   #fff8f0;
        --dark:    #0e0810;
        --mid:     #1c1020;
        --teal:    #39c6d6;
      }

      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 100%; height: 100%;
        overflow: hidden;
      }

      body {
        font-family: 'DM Sans', sans-serif;
        background: var(--dark);
        color: var(--cream);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      /* ── Ambient background ── */
      .bg {
        position: fixed; inset: 0; z-index: 0;
        overflow: hidden;
      }

      .bg-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0;
        animation: orbFloat 8s ease-in-out infinite;
      }

      .bg-orb:nth-child(1) {
        width: 520px; height: 520px;
        background: radial-gradient(circle, rgba(255,128,171,0.18), transparent 70%);
        top: -100px; left: -100px;
        animation-delay: 0s;
      }
      .bg-orb:nth-child(2) {
        width: 400px; height: 400px;
        background: radial-gradient(circle, rgba(57,198,214,0.12), transparent 70%);
        bottom: -80px; right: -80px;
        animation-delay: 2s;
      }
      .bg-orb:nth-child(3) {
        width: 300px; height: 300px;
        background: radial-gradient(circle, rgba(194,24,91,0.14), transparent 70%);
        top: 40%; left: 55%;
        animation-delay: 4s;
      }

      @keyframes orbFloat {
        0%   { opacity: 0; transform: scale(0.9) translate(0, 0); }
        20%  { opacity: 1; }
        50%  { transform: scale(1.08) translate(20px, -15px); }
        80%  { opacity: 1; }
        100% { opacity: 0; transform: scale(0.9) translate(0, 0); }
      }

      /* Subtle grain overlay */
      .bg::after {
        content: '';
        position: absolute; inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        opacity: 0.4;
      }

      /* Floating petals */
      .petals {
        position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden;
      }

      .petal {
        position: absolute;
        top: -40px;
        font-size: 1.2rem;
        opacity: 0;
        animation: petalFall linear infinite;
      }

      @keyframes petalFall {
        0%   { transform: translateY(0) rotate(0deg) scale(0.6); opacity: 0; }
        10%  { opacity: 0.6; }
        90%  { opacity: 0.3; }
        100% { transform: translateY(110vh) rotate(360deg) scale(1); opacity: 0; }
      }

      /* ── Main card ── */
      .card {
        position: relative; z-index: 10;
        text-align: center;
        padding: 60px 50px 50px;
        max-width: 560px;
        width: 90%;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,180,198,0.12);
        border-radius: 28px;
        backdrop-filter: blur(20px);
        box-shadow:
          0 0 0 1px rgba(255,180,198,0.06),
          0 30px 80px rgba(0,0,0,0.5),
          inset 0 1px 0 rgba(255,255,255,0.06);
        animation: cardReveal 1s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      @keyframes cardReveal {
        from { opacity: 0; transform: translateY(30px) scale(0.97); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }

      /* Decorative top line */
      .card::before {
        content: '';
        position: absolute;
        top: 0; left: 50%; transform: translateX(-50%);
        width: 80px; height: 2px;
        background: linear-gradient(90deg, transparent, var(--blush), transparent);
        border-radius: 2px;
      }

      /* ── Greeting name ── */
      .greetings {
        font-family: 'Cormorant Garamond', serif;
        font-size: clamp(3rem, 10vw, 5.5rem);
        font-weight: 600;
        letter-spacing: 0.08em;
        line-height: 1;
        margin-bottom: 6px;
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 0 2px;
      }

      .greetings > span {
        display: inline-block;
        animation: letterReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1) both, shimmer 4s ease-in-out infinite;
        background: linear-gradient(135deg, #fff 30%, var(--rose) 60%, var(--teal) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        background-size: 200% 200%;
      }

      @keyframes letterReveal {
        from { opacity: 0; transform: translateY(20px) rotateX(40deg); }
        to   { opacity: 1; transform: translateY(0) rotateX(0deg); }
      }

      @keyframes shimmer {
        0%, 100% { background-position: 0% 50%; }
        50%       { background-position: 100% 50%; }
      }

      /* stagger each letter */
      .greetings > span:nth-child(1)  { animation-delay: 0.1s, 0s; }
      .greetings > span:nth-child(2)  { animation-delay: 0.18s, 0.3s; }
      .greetings > span:nth-child(3)  { animation-delay: 0.26s, 0.6s; }
      .greetings > span:nth-child(4)  { animation-delay: 0.34s, 0.9s; }
      .greetings > span:nth-child(5)  { animation-delay: 0.42s, 1.2s; }
      .greetings > span:nth-child(6)  { animation-delay: 0.50s, 1.5s; }
      .greetings > span:nth-child(7)  { animation-delay: 0.58s, 1.8s; }
      .greetings > span:nth-child(8)  { animation-delay: 0.66s, 2.1s; }
      .greetings > span:nth-child(9)  { animation-delay: 0.74s, 2.4s; }
      .greetings > span:nth-child(10) { animation-delay: 0.82s, 2.7s; }

      /* dash separator between name and Т */
      .greetings > span:nth-child(9) {
        opacity: 0.4;
        font-weight: 300;
        margin: 0 1px;
      }

      /* ── Tagline ── */
      .description {
        font-family: 'Cormorant Garamond', serif;
        font-style: italic;
        font-size: clamp(1rem, 3vw, 1.25rem);
        font-weight: 300;
        color: rgba(255,200,210,0.75);
        letter-spacing: 0.03em;
        margin: 18px 0 40px;
        animation: fadeUp 0.8s 1s cubic-bezier(0.16, 1, 0.3, 1) both;
        line-height: 1.5;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ── Divider ── */
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 40px;
        animation: fadeUp 0.8s 1.1s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .divider::before, .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255,128,171,0.3));
      }
      .divider::after {
        background: linear-gradient(90deg, rgba(255,128,171,0.3), transparent);
      }

      .divider-icon {
        font-size: 1rem;
        opacity: 0.6;
      }

      /* ── Buttons ── */
      .button-container {
        display: flex;
        gap: 16px;
        justify-content: center;
        flex-wrap: wrap;
        animation: fadeUp 0.8s 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .btn {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.9rem;
        font-weight: 400;
        letter-spacing: 0.04em;
        padding: 14px 28px;
        border-radius: 50px;
        transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        overflow: hidden;
        cursor: pointer;
      }

      .btn::after {
        content: '';
        position: absolute; inset: 0;
        border-radius: inherit;
        opacity: 0;
        transition: opacity 0.3s;
      }

      .btn:hover::after { opacity: 1; }

      .btn-primary {
        background: linear-gradient(135deg, var(--blush), var(--deep));
        color: #fff;
        box-shadow: 0 4px 20px rgba(255,128,171,0.35);
        border: none;
      }

      .btn-primary::after {
        background: linear-gradient(135deg, #ff99bb, #e91e63);
      }

      .btn-primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 35px rgba(255,128,171,0.5);
      }

      .btn-secondary {
        background: transparent;
        color: rgba(255,200,220,0.9);
        border: 1px solid rgba(255,128,171,0.3);
        box-shadow: inset 0 0 0 0 rgba(57,198,214,0.1);
      }

      .btn-secondary::after {
        background: rgba(57,198,214,0.08);
      }

      .btn-secondary:hover {
        transform: translateY(-3px);
        border-color: rgba(57,198,214,0.5);
        color: #fff;
        box-shadow: 0 8px 28px rgba(57,198,214,0.2);
      }

      /* ── Nav links at bottom ── */
      .nav-links {
        display: flex;
        justify-content: center;
        gap: 24px;
        margin-top: 36px;
        animation: fadeUp 0.8s 1.4s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .nav-links a {
        font-size: 0.78rem;
        color: rgba(255,255,255,0.3);
        text-decoration: none;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        transition: color 0.2s;
        padding: 4px 0;
        border-bottom: 1px solid transparent;
      }

      .nav-links a:hover {
        color: rgba(255,180,198,0.8);
        border-bottom-color: rgba(255,128,171,0.3);
      }

      /* ── Responsive ── */
      @media (max-width: 480px) {
        .card {
          padding: 50px 28px 40px;
        }
        .button-container {
          flex-direction: column;
          align-items: stretch;
        }
        .btn {
          justify-content: center;
          padding: 14px 20px;
        }
        .nav-links { gap: 16px; }
      }
    </style>
  </head>
  <body>

    <!-- Ambient background -->
    <div class="bg">
      <div class="bg-orb"></div>
      <div class="bg-orb"></div>
      <div class="bg-orb"></div>
    </div>

    <!-- Floating petals -->
    <div class="petals" id="petals"></div>

    <!-- Main card -->
    <div class="card">
      <div class="greetings">
        <span>О</span><span>Ю</span><span>У</span><span>Н</span>
        <span>Д</span><span>А</span><span>Р</span><span>Ь</span>
        <span>-</span><span>Т</span>
      </div>

      <p class="description">Чамд зориулсан цэцгийг хүлээн авна уу 🌸❤️</p>

      <div class="divider"><span class="divider-icon">✦</span></div>

      <div class="button-container">
        <a href="flower.html" class="btn btn-primary">
          🌸 Цэцэг
        </a>
        <a href="album.html" class="btn btn-secondary">
          📷 Бидний дурсамж
        </a>
      </div>

      <nav class="nav-links">
        <a href="thoughts.html">💭 Notes</a>
        <a href="album.html">📸 Album</a>
      </nav>
    </div>

    <script>
      // Spawn floating petals
      const petals = document.getElementById('petals');
      const symbols = ['🌸','🌺','✿','❀','🌷','✦'];

      function spawnPetal() {
        const el = document.createElement('span');
        el.className = 'petal';
        el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        el.style.left = Math.random() * 100 + 'vw';
        el.style.fontSize = (0.7 + Math.random() * 0.8) + 'rem';
        const dur = 7 + Math.random() * 8;
        el.style.animationDuration = dur + 's';
        el.style.animationDelay = (Math.random() * 4) + 's';
        petals.appendChild(el);
        setTimeout(() => el.remove(), (dur + 4) * 1000);
      }

      // Spawn a few immediately, then keep spawning
      for (let i = 0; i < 8; i++) setTimeout(spawnPetal, i * 400);
      setInterval(spawnPetal, 1200);
    </script>
  </body>
</html>
